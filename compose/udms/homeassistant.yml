services:
  # Home Assistant - Home Automation
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    # Host networking is required for mDNS and SSDP/UPnP device discovery
    # (NVIDIA Shield, WiiM, Samsung soundbar, Chromecasts, etc.)
    # Note: Traefik labels don't work in host mode — expose via Cloudflare
    # tunnel instead by pointing ha.yourdomain.com -> http://localhost:8123
    network_mode: host
    volumes:
      - $DOCKERDIR/appdata/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      TZ: $TZ
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
