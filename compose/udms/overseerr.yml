services:
  # overseerr - UI for Radarr/Sonarr
  overseerr:
    image: lscr.io/linuxserver/overseerr:latest
    container_name: overseerr
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    # profiles: ["media", "arrs", "all"]
    networks:
      - t3_proxy
    ports:
      - "5055:5055"
    volumes:
      - $DOCKERDIR/appdata/overseerr:/config
    environment:
      TZ: $TZ
      PUID: $PUID
      PGID: $PGID
    labels:
      - "traefik.enable=false"
      # HTTP Routers
      - "traefik.http.routers.overseerr-rtr.entrypoints=web"
      - "traefik.http.routers.overseerr-rtr.rule=Host(`overseerr.$DOMAINNAME_1`)"
      # Middlewares
      # - "traefik.http.routers.overseerr-rtr.middlewares=chain-oauth@file"
      # - "traefik.http.routers.overseerr-rtr.middlewares=chain-basic-auth@file"
      # HTTP Services
      - "traefik.http.routers.overseerr-rtr.service=overseerr-svc"
      - "traefik.http.services.overseerr-svc.loadbalancer.server.port=5055"
      - "com.centurylinklabs.watchtower.enable=true"
